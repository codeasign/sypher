translate(-100, -48)"><rect/><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>if nums[left] &lt;= nums[mid]:<br />left half is sorted<br />→ can binary search here normally</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-RightSorted-4" data-look="classic" transform="translate(414.2265625, 623)"><rect class="basic label-container" style="" x="-96.2265625" y="-39" width="192.453125" height="78"/><g class="label" style="" transform="translate(-66.2265625, -24)"><rect/><foreignObject width="132.453125" height="48"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>else:<br />right half is sorted</p></span></div></foreignObject></g></g><g class="node default" id="my-svg-flowchart-Decide-5" data-look="classic" transform="translate(276.11328125, 799)"><rect class="basic label-container" style="" x="-130" y="-63" width="260" height="126"/><g class="label" style="" transform="translate(-100, -48)"><rect/><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Check target bounds against the<br />sorted half to decide which<br />direction to go</p></span></div></foreignObject></g></g></g></g></g><defs><filter id="my-svg-drop-shadow" height="130%" width="130%"><feDropShadow dx="4" dy="4" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs><defs><filter id="my-svg-drop-shadow-small" height="150%" width="150%"><feDropShadow dx="2" dy="2" stdDeviation="0" flood-opacity="0.06" flood-color="#000000"/></filter></defs></svg>